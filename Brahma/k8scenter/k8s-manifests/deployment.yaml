---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubevision-backend
  namespace: kubevision
  labels:
    app.kubernetes.io/name: kubevision
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubevision-backend
  template:
    metadata:
      labels:
        app: kubevision-backend
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: kubevision-backend
      containers:
        - name: backend
          image: kubevision-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: ENV
              value: "production"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kubevision-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      securityContext:
        fsGroup: 1000

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubevision-frontend
  namespace: kubevision
  labels:
    app.kubernetes.io/name: kubevision
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubevision-frontend
  template:
    metadata:
      labels:
        app: kubevision-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: kubevision-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: kubevision-backend
  namespace: kubevision
spec:
  selector:
    app: kubevision-backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: kubevision-frontend
  namespace: kubevision
spec:
  selector:
    app: kubevision-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP

---
# Secret (replace value with real base64 secret)
apiVersion: v1
kind: Secret
metadata:
  name: kubevision-secrets
  namespace: kubevision
type: Opaque
stringData:
  jwt-secret: "kubevision-replace-with-secure-random-secret-in-production"

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubevision
  namespace: kubevision
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: kubevision.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kubevision-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubevision-frontend
                port:
                  number: 80
