version: "3.9"

services:

  # ── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: gorakhpur_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gorakhpur_planner}
      MYSQL_USER: ${MYSQL_USER:-gorakhpur}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gorakhpur123}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-gorakhpur}",
             "-p${MYSQL_PASSWORD:-gorakhpur123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Python / Flask Backend ────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: gorakhpur_backend
    restart: always
    environment:
      DB_HOST: db
      DB_USER: ${MYSQL_USER:-gorakhpur}
      DB_PASSWORD: ${MYSQL_PASSWORD:-gorakhpur123}
      DB_NAME: ${MYSQL_DATABASE:-gorakhpur_planner}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: gorakhpur_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
